<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ My Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    /* ── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── TOKENS ─────────────────────────────────── */
    :root {
      --pink:    #ffb3c6;
      --peach:   #ffd6a5;
      --mint:    #b5ead7;
      --sky:     #c0e8ff;
      --lilac:   #d4b8ff;
      --cream:   #fff8f0;
      --ink:     #2d2640;
      --muted:   #9b8eae;
      --white:   #ffffff;
      --r:       22px;
      --gap:     14px;
    }

    /* ── BODY + BACKGROUND ───────────────────────── */
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 18px 72px;
      position: relative;
      overflow-x: hidden;
    }

    /* soft blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #ffd6e8 0%, transparent 70%);
      top: -120px; left: -120px;
      opacity: 0.7;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #c3f0e0 0%, transparent 70%);
      bottom: -100px; right: -100px;
      opacity: 0.6;
    }

    /* ── CONTAINER ───────────────────────────────── */
    .wrap {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    /* ── DECORATIVE HEADER ───────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .sparkle-row {
      font-size: 22px;
      letter-spacing: 6px;
      margin-bottom: 10px;
      animation: floatSparkle 3s ease-in-out infinite;
    }
    @keyframes floatSparkle {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .header-tag {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(180,160,210,0.25);
      border-radius: 99px;
      padding: 6px 18px;
      backdrop-filter: blur(6px);
    }

    /* ── SECTION CHIP ────────────────────────────── */
    .section-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 26px 0 10px;
      opacity: 0;
      animation: riseIn 0.5s ease forwards;
    }
    .section-chip span {
      font-family: 'Syne', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .chip-line {
      flex: 1;
      height: 1.5px;
      border-radius: 99px;
      background: linear-gradient(90deg, rgba(180,160,210,0.30), transparent);
    }

    /* ── LINK CARD ───────────────────────────────── */
    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      background: var(--white);
      border-radius: var(--r);
      padding: 17px 20px;
      margin-bottom: var(--gap);
      border: 2px solid transparent;
      box-shadow: 0 3px 16px rgba(100,80,140,0.08);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition:
        transform   0.26s cubic-bezier(.34,1.56,.64,1),
        box-shadow  0.26s ease,
        border-color 0.2s ease;

      opacity: 0;
      animation: riseIn 0.55s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* shimmer sweep on hover */
    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg,
        transparent 35%,
        rgba(255,255,255,0.55) 50%,
        transparent 65%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .link-card:hover::after { transform: translateX(100%); }

    .link-card:hover {
      transform: translateY(-4px) scale(1.012);
      box-shadow: 0 10px 36px rgba(100,80,140,0.15);
    }
    .link-card:active {
      transform: scale(0.98);
    }

    /* per-card accent colors via border + icon bg */
    .link-card[data-color="pink"]:hover   { border-color: var(--pink); }
    .link-card[data-color="peach"]:hover  { border-color: var(--peach); }
    .link-card[data-color="mint"]:hover   { border-color: var(--mint); }
    .link-card[data-color="sky"]:hover    { border-color: var(--sky); }
    .link-card[data-color="lilac"]:hover  { border-color: var(--lilac); }

    /* icon bubble */
    .card-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    .link-card:hover .card-icon { transform: rotate(-8deg) scale(1.15); }

    .link-card[data-color="pink"]  .card-icon { background: #ffe4ed; }
    .link-card[data-color="peach"] .card-icon { background: #ffefd4; }
    .link-card[data-color="mint"]  .card-icon { background: #d6f5ea; }
    .link-card[data-color="sky"]   .card-icon { background: #d9f1ff; }
    .link-card[data-color="lilac"] .card-icon { background: #ece3ff; }

    /* label */
    .card-label {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--ink);
      flex: 1;
      letter-spacing: 0.01em;
    }

    /* arrow */
    .card-arrow {
      font-size: 18px;
      color: var(--muted);
      transition: transform 0.25s ease, color 0.2s ease;
      line-height: 1;
    }
    .link-card:hover .card-arrow {
      transform: translateX(5px);
      color: var(--ink);
    }

    /* ── STAGGER DELAYS ──────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* section chips */
    .section-chip:nth-of-type(1) { animation-delay: 0.00s; }
    .section-chip:nth-of-type(2) { animation-delay: 0.30s; }
    .section-chip:nth-of-type(3) { animation-delay: 0.55s; }

    /* cards — JS sets --i for delay */
    .link-card { animation-delay: calc(var(--i, 0) * 0.08s + 0.05s); }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      margin-top: 52px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      position: relative; z-index: 1;
      letter-spacing: 0.05em;
    }
    footer span { font-size: 14px; }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 380px) {
      .card-label { font-size: 15px; }
      body { padding: 40px 12px 60px; }
    }
  </style>
</head>
<body>

<script>
  // Assign stagger index to every card so CSS delay works
  document.querySelectorAll('.link-card').forEach((card, i) => {
    card.style.setProperty('--i', i);
  });

  // Ripple on click
  document.querySelectorAll('.link-card').forEach(card => {
    card.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = card.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.6;
      ripple.style.cssText = `
        position:absolute;
        width:${size}px; height:${size}px;
        border-radius:50%;
        background:rgba(180,160,220,0.18);
        top:${e.clientY - rect.top - size/2}px;
        left:${e.clientX - rect.left - size/2}px;
        transform:scale(0);
        animation:rippleOut 0.55s ease forwards;
        pointer-events:none;
      `;
      card.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
</script>

<style>
  @keyframes rippleOut {
    to { transform: scale(1); opacity: 0; }
  }
</style>
